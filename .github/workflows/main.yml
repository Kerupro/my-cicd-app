name: CI/CD Pipeline

on:
  push:
    [cite_start]branches: [ main ] # Пайплайн запускается при пуше в основную ветку [cite: 11]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        [cite_start]run: npm test # Этап автоматических тестов [cite: 13]

  deploy:
    [cite_start]needs: build-and-test # Деплой только после успешных тестов [cite: 19]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./